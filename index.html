<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>JESKO | NEOBANK</title>
</head>
<body class="bg-black text-white font-mono flex items-center justify-center min-h-screen p-4">
    <div class="p-8 border border-blue-900 rounded-3xl bg-zinc-950 shadow-2xl w-full max-w-sm text-center relative overflow-hidden">
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-blue-900/20 blur-3xl rounded-full"></div>
        
        <h1 class="text-blue-500 font-black tracking-[0.2em] mb-4 italic text-xl">JESKO VAULT</h1>
        
        <div class="py-10 border-y border-zinc-800/50 my-6 bg-black/40 rounded-xl">
            <p class="text-[10px] text-zinc-500 mb-2 tracking-widest uppercase">Available Balance</p>
            <h2 id="balance" class="text-4xl font-black text-white tracking-tight">Rp ---</h2>
        </div>

        <div class="space-y-2">
            <div class="flex items-center justify-center gap-2">
                <div id="status-dot" class="w-2 h-2 bg-red-600 rounded-full"></div>
                <p id="status-text" class="text-[10px] text-zinc-500 uppercase font-bold">Offline</p>
            </div>
            <p class="text-[8px] text-zinc-700 uppercase">System: Anti-Gravity V2.0</p>
        </div>

        <div id="debug" class="mt-6 text-[8px] text-zinc-600 text-left bg-black p-2 rounded border border-zinc-900 overflow-hidden h-10">
            Waiting for connection...
        </div>
    </div>

    <script>
        const balanceEl = document.getElementById('balance');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const debugEl = document.getElementById('debug');

        // PENTING: Key ini harus SAMA dengan yang di index.js
        const API_KEY = '6767Sigma'; 

        async function fetchVaultData() {
            try {
                debugEl.innerText = "Fetching: /api?key=" + API_KEY;
                
                const response = await fetch(`/api?key=${API_KEY}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP Error! Status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.balance !== undefined) {
                    // Update Balance
                    balanceEl.innerText = 'Rp ' + Number(data.balance).toLocaleString('id-ID');
                    
                    // Update Status UI
                    statusDot.className = "w-2 h-2 bg-green-500 shadow-[0_0_8px_#22c55e]";
                    statusText.innerText = "Synced";
                    statusText.className = "text-[10px] text-green-500 uppercase font-bold";
                    debugEl.innerText = "Last Update: " + new Date().toLocaleTimeString();
                } else {
                    throw new Error("Data balance kosong");
                }

            } catch (error) {
                console.error("Sync Error:", error);
                balanceEl.innerText = "Error";
                statusDot.className = "w-2 h-2 bg-red-600 animate-pulse";
                statusText.innerText = "Connection Lost";
                debugEl.innerText = "Log: " + error.message;
            }
        }

        // Jalankan fetch tiap 5 detik
        setInterval(fetchVaultData, 5000);
        // Jalankan sekali di awal
        fetchVaultData();
    </script>
</body>
</html>
