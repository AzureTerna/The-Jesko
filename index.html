<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>JESKO | NEOBANK</title>
</head>
<body class="bg-black text-white font-mono flex items-center justify-center min-h-screen p-4">
    <div class="p-8 border border-blue-900 rounded-3xl bg-zinc-950 shadow-2xl w-full max-w-sm text-center relative overflow-hidden">
        <h1 class="text-blue-500 font-black tracking-[0.2em] mb-4 italic text-xl">JESKO VAULT</h1>
        
        <div class="py-10 border-y border-zinc-800/50 my-6 bg-black/40 rounded-xl">
            <p class="text-[10px] text-zinc-500 mb-2 tracking-widest uppercase">Available Balance</p>
            <h2 id="balance" class="text-4xl font-black text-white tracking-tight">Rp ---</h2>
        </div>

        <div class="flex items-center justify-center gap-2">
            <div id="status-dot" class="w-2 h-2 bg-red-600 rounded-full"></div>
            <p id="status-text" class="text-[10px] text-zinc-500 uppercase font-bold">Connecting...</p>
        </div>

        <div id="log" class="mt-4 text-[8px] text-zinc-700 uppercase tracking-tighter truncate">Initializing System...</div>
    </div>

    <script>
        const API_KEY = '6767Sigma'; 
        
        async function update() {
            try {
                const r = await fetch(`/api?key=${API_KEY}`);
                const d = await r.json();
                
                if (d.balance !== undefined) {
                    document.getElementById('balance').innerText = 'Rp ' + d.balance.toLocaleString('id-ID');
                    document.getElementById('status-dot').className = "w-2 h-2 bg-green-500 shadow-[0_0_8px_#22c55e]";
                    document.getElementById('status-text').innerText = "Synced";
                    document.getElementById('log').innerText = "Last Sync: " + new Date().toLocaleTimeString();
                } else {
                    throw new Error(d.error || "Unknown Error");
                }
            } catch(e) {
                document.getElementById('balance').innerText = "Error";
                document.getElementById('status-dot').className = "w-2 h-2 bg-red-600 animate-pulse";
                document.getElementById('status-text').innerText = "Error 500";
                document.getElementById('log').innerText = "Log: " + e.message;
            }
        }
        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
