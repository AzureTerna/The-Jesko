<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>JESKO NEOBANK | DASHBOARD</title>
</head>
<body class="bg-slate-950 text-slate-200 font-mono min-h-screen p-4">
    <div class="max-w-md mx-auto space-y-6">
        <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <h1 class="text-xl font-black text-blue-500 tracking-widest italic">JESKO_VAULT</h1>
            <span class="text-[10px] bg-blue-900/30 px-2 py-1 rounded border border-blue-500/50">ENC_V2</span>
        </div>

        <div class="bg-gradient-to-br from-slate-900 to-black p-8 rounded-3xl border border-slate-800 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10 font-black text-4xl">NEO</div>
            <p class="text-xs text-slate-500 uppercase tracking-widest mb-1">Available Liquidity</p>
            <h2 id="balance" class="text-4xl font-black text-white">Rp 0</h2>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="transact('isi', 50000)" class="bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-2xl font-bold transition-all active:scale-95 text-sm">
                + ISI 50K
            </button>
            <button onclick="transact('tarik', 50000)" class="bg-slate-800 hover:bg-slate-700 text-white p-4 rounded-2xl font-bold transition-all active:scale-95 text-sm border border-slate-700">
                - TARIK 50K
            </button>
        </div>

        <div class="border-t border-slate-800 pt-6">
            <p class="text-[10px] text-slate-500 mb-4 uppercase font-bold tracking-widest">Live Activity Log</p>
            <div id="logs" class="space-y-3 text-[12px]">
                <div class="flex justify-between text-slate-400 italic">Connecting to Neural Link...</div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'SIGMA6767';
        
        async function updateUI() {
            const res = await fetch(`/api?key=${API_KEY}`);
            const data = await res.json();
            document.getElementById('balance').innerText = 'Rp ' + data.balance.toLocaleString('id-ID');
        }

        async function transact(action, amount) {
            const res = await fetch(`/api?key=${API_KEY}&action=${action}&amount=${amount}`);
            const data = await res.json();
            if(data.error) alert('Error: ' + data.error);
            else {
                updateUI();
                addLog(action, amount);
            }
        }

        function addLog(action, amount) {
            const logBox = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML = `<div class="flex justify-between border-b border-slate-900 pb-1">
                <span>[${time}] ${action.toUpperCase()} SUCCESS</span>
                <span class="${action === 'isi' ? 'text-green-500' : 'text-red-500'} font-bold">Rp${amount.toLocaleString()}</span>
            </div>` + logBox.innerHTML;
        }

        setInterval(updateUI, 3000); // Sinkron tiap 3 detik
        updateUI();
    </script>
</body>
</html>
