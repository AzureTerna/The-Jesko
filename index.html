<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>JESKO | NEOBANK</title>
</head>
<body class="bg-black text-white font-mono flex items-center justify-center min-h-screen">
    <div class="p-10 border border-blue-600 rounded-3xl bg-zinc-950 shadow-[0_0_50px_-15px_rgba(37,99,235,0.4)] w-80 text-center">
        <h1 class="text-blue-500 font-black tracking-[0.3em] mb-6 italic text-xl">JESKO VAULT</h1>
        
        <div class="py-8 border-y border-zinc-900 my-4 bg-black/50">
            <p class="text-[9px] text-zinc-600 mb-1 tracking-widest uppercase italic">Available Balance</p>
            <h2 id="balance" class="text-4xl font-bold tracking-tighter">Rp ---</h2>
        </div>

        <div class="flex flex-col items-center gap-2">
            <div class="flex items-center gap-2">
                <div id="dot" class="w-2 h-2 bg-zinc-800 rounded-full"></div>
                <p id="stat" class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest text-blue-900">SCANNING...</p>
            </div>
            <p id="err" class="text-[7px] text-red-900 uppercase truncate w-full"></p>
        </div>
    </div>

    <script>
        const API_KEY = '6767Sigma';

        async function update() {
            try {
                const r = await fetch(`/api?key=${API_KEY}`);
                
                if (!r.ok) {
                    const errData = await r.json();
                    throw new Error(errData.error || "HTTP_" + r.status);
                }

                const d = await r.json();
                
                if (d.balance !== undefined) {
                    document.getElementById('balance').innerText = 'Rp ' + d.balance.toLocaleString('id-ID');
                    document.getElementById('dot').className = "w-2 h-2 bg-blue-500 shadow-[0_0_10px_#2563eb]";
                    document.getElementById('stat').innerText = "ONLINE";
                    document.getElementById('err').innerText = "";
                }
            } catch(e) {
                document.getElementById('dot').className = "w-2 h-2 bg-red-600 animate-pulse";
                document.getElementById('stat').innerText = "SYNC_FAILED";
                document.getElementById('err').innerText = "LOG: " + e.message;
            }
        }

        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
